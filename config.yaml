# AgentPulse — Configuration
# SLA thresholds, service ports, and eval parameters.
# Copy .env.example → .env for Azure OpenAI credentials (never set them here).

azure_openai:
  deployment: "gpt-5.2-chat-2"        # override via AZURE_OPENAI_DEPLOYMENT env var
  api_version: "2024-12-01-preview"   # override via AZURE_OPENAI_API_VERSION env var

mlflow:
  tracking_uri: "http://localhost:5001"
  experiment_name: "it-helpdesk-agent-evals"

agent:
  name: "IT Helpdesk Support Agent"
  api_host: "0.0.0.0"
  api_port: 8001
  invoke_endpoint: "/invoke"

rag:
  knowledge_base_path: "data/knowledge_base"
  embedding_model: "text-embedding-ada-002"
  top_k: 5

load_test:
  locust_host: "http://localhost:8001"
  default_users: 10
  spawn_rate: 2
  run_time: "180s"

sla_thresholds:
  p95_latency_ms: 15000
  error_rate_pct: 5.0
  min_task_success_rate: 0.75

eval:
  # RAG · Retrieval
  min_contextual_relevancy: 0.6
  # RAG · Generation
  min_faithfulness_score: 0.7
  min_answer_relevancy: 0.7
  # Helpdesk Quality (GEval)
  min_completeness: 0.5
  min_actionability: 0.5
  min_professional_tone: 0.5
  min_task_resolution: 0.5
  # Safety (lower score = safer; threshold = max acceptable level)
  max_toxicity: 0.3
  # Composite KPI targets
  min_rag_score: 0.7
  min_helpdesk_score: 0.6
  min_safety_score: 0.7
  min_quality_score: 0.65    # headline KPI

dashboard:
  port: 8501
  refresh_interval_sec: 5

reports:
  output_dir: "reports/output"
  template_path: "reports/templates/report.html"
